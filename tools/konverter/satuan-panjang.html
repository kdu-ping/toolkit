<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Konverter Satuan Panjang – Meter, Km, Inch, Feet Online | ToolboxOnline</title>
  <meta name="description" content="Konversi satuan panjang online: meter, kilometer, centimeter, millimeter, inch, feet, yard, mil. Gratis, instan, tanpa login." />
  <link rel="canonical" href="https://kdu-ping.github.io/toolkit/tools/konverter/satuan-panjang.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0F172A; --surface: #1E293B; --border: #334155; --accent: #22D3EE; --text: #F8FAFC; --muted: #94A3B8; --radius: 12px; --font: 'Plus Jakarta Sans', sans-serif; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; line-height: 1.6; }
    header { border-bottom: 1px solid var(--border); padding: 0 24px; position: sticky; top: 0; background: rgba(15,23,42,0.92); backdrop-filter: blur(12px); z-index: 100; }
    .header-inner { max-width: 900px; margin: 0 auto; height: 60px; display: flex; align-items: center; gap: 12px; }
    .back-btn { display: flex; align-items: center; gap: 6px; color: var(--muted); text-decoration: none; font-size: 0.82rem; font-weight: 600; transition: color 0.18s; }
    .back-btn:hover { color: var(--accent); }
    .logo { font-size: 1rem; font-weight: 800; color: var(--text); text-decoration: none; }
    .logo span { color: var(--accent); }
    .page-hero { max-width: 900px; margin: 0 auto; padding: 48px 24px 32px; }
    .breadcrumb { font-size: 0.75rem; color: var(--muted); margin-bottom: 12px; }
    .breadcrumb a { color: var(--muted); text-decoration: none; }
    .breadcrumb a:hover { color: var(--accent); }
    h1 { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 800; letter-spacing: -0.3px; margin-bottom: 8px; }
    .page-desc { color: var(--muted); font-size: 0.9rem; }
    main { max-width: 640px; margin: 0 auto; padding: 0 24px 80px; }

    /* INPUT UTAMA */
    .input-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; }
    .input-row { display: flex; gap: 12px; align-items: center; }
    .input-number {
      flex: 1; padding: 14px 16px;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: var(--font); font-size: 1.2rem; font-weight: 700;
      outline: none; transition: border-color 0.18s;
    }
    .input-number:focus { border-color: var(--accent); }
    .input-number::placeholder { color: var(--muted); font-size: 1rem; font-weight: 400; }
    select {
      padding: 14px 16px; background: var(--bg);
      border: 1.5px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: var(--font); font-size: 0.9rem; font-weight: 600;
      outline: none; cursor: pointer; transition: border-color 0.18s;
      min-width: 160px;
    }
    select:focus { border-color: var(--accent); }

    /* HASIL GRID */
    .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    @media (max-width: 480px) { .results-grid { grid-template-columns: 1fr; } }
    .result-item {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      display: flex; flex-direction: column; gap: 2px;
      cursor: pointer; transition: border-color 0.18s;
      position: relative;
    }
    .result-item:hover { border-color: var(--accent); }
    .result-item.active { border-color: var(--accent); background: #0F3349; }
    .result-unit { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--muted); }
    .result-val { font-size: 1.1rem; font-weight: 800; color: var(--text); word-break: break-all; }
    .result-fullname { font-size: 0.7rem; color: var(--muted); }
    .copy-hint { position: absolute; top: 8px; right: 10px; font-size: 0.65rem; color: var(--muted); opacity: 0; transition: opacity 0.18s; }
    .result-item:hover .copy-hint { opacity: 1; }

    footer { border-top: 1px solid var(--border); padding: 24px; text-align: center; color: var(--muted); font-size: 0.78rem; }
    footer a { color: var(--accent); text-decoration: none; }
    @media (max-width: 480px) { .page-hero, main { padding-left: 16px; padding-right: 16px; } .input-row { flex-direction: column; } select { width: 100%; } }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a class="back-btn" href="/toolkit/">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Kembali
      </a>
      <a class="logo" href="/toolkit/">⚡ Toolbox<span>Online</span></a>
    </div>
  </header>
  <div class="page-hero">
    <div class="breadcrumb"><a href="/toolkit/">Home</a> › <a href="#">Konverter</a> › Satuan Panjang</div>
    <h1>📏 Konverter Satuan Panjang</h1>
    <p class="page-desc">Konversi meter, km, cm, inch, feet, yard, dan lainnya secara instan.</p>
  </div>
  <main>
    <div class="input-card">
      <div class="input-row">
        <input type="number" class="input-number" id="inputVal" placeholder="Masukkan angka…" oninput="convert()" />
        <select id="fromUnit" onchange="convert()">
          <option value="mm">Millimeter (mm)</option>
          <option value="cm">Centimeter (cm)</option>
          <option value="m" selected>Meter (m)</option>
          <option value="km">Kilometer (km)</option>
          <option value="in">Inch (in)</option>
          <option value="ft">Feet (ft)</option>
          <option value="yd">Yard (yd)</option>
          <option value="mi">Mil (mi)</option>
          <option value="nmi">Mil Laut (nmi)</option>
        </select>
      </div>
    </div>

    <div class="results-grid" id="results-grid"></div>
  </main>
  <footer>
    <p>© 2025 ToolboxOnline &nbsp;·&nbsp; <a href="/toolkit/">Kembali ke Dashboard</a></p>
  </footer>
  <script>
    // semua dalam meter
    const units = [
      { key: "mm",  name: "Millimeter",  full: "Millimeter",        factor: 0.001      },
      { key: "cm",  name: "Centimeter",  full: "Centimeter",        factor: 0.01       },
      { key: "m",   name: "Meter",       full: "Meter",             factor: 1          },
      { key: "km",  name: "Kilometer",   full: "Kilometer",         factor: 1000       },
      { key: "in",  name: "Inch",        full: "Inch",              factor: 0.0254     },
      { key: "ft",  name: "Feet",        full: "Kaki (Feet)",       factor: 0.3048     },
      { key: "yd",  name: "Yard",        full: "Yard",              factor: 0.9144     },
      { key: "mi",  name: "Mil",         full: "Mil (Mile)",        factor: 1609.344   },
      { key: "nmi", name: "Mil Laut",    full: "Mil Laut (Nautical Mile)", factor: 1852 },
    ];

    function formatNum(n) {
      if (n === 0) return "0";
      if (Math.abs(n) < 0.000001 || Math.abs(n) >= 1e12) return n.toExponential(4);
      if (Math.abs(n) < 0.01) return parseFloat(n.toPrecision(6)).toString();
      return parseFloat(n.toPrecision(10)).toLocaleString("id");
    }

    function convert() {
      const val = parseFloat(document.getElementById("inputVal").value);
      const fromKey = document.getElementById("fromUnit").value;
      const fromUnit = units.find(u => u.key === fromKey);
      const grid = document.getElementById("results-grid");
      grid.innerHTML = "";

      units.forEach(u => {
        if (u.key === fromKey) return;
        const result = isNaN(val) ? "–" : formatNum(val * fromUnit.factor / u.factor);
        const item = document.createElement("div");
        item.className = "result-item";
        item.innerHTML =
          '<span class="copy-hint">klik untuk salin</span>' +
          '<div class="result-unit">' + u.name + '</div>' +
          '<div class="result-val" id="val-' + u.key + '">' + result + '</div>' +
          '<div class="result-fullname">' + u.full + '</div>';
        item.addEventListener("click", () => {
          if (result === "–") return;
          navigator.clipboard.writeText(result.replace(/\./g, "").replace(",", ".")).then(() => {
            item.classList.add("active");
            setTimeout(() => item.classList.remove("active"), 1000);
          });
        });
        grid.appendChild(item);
      });
    }

    convert();
  </script>
</body>
</html>
