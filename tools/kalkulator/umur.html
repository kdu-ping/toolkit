<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalkulator Umur – Hitung Usia dari Tanggal Lahir | ToolboxOnline</title>
  <meta name="description" content="Hitung umur tepat dari tanggal lahir hingga hari ini. Tampil dalam tahun, bulan, hari, jam, dan menit. Gratis, instan, tanpa login." />
  <link rel="canonical" href="https://kdu-ping.github.io/toolkit/tools/kalkulator/umur.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0F172A; --surface: #1E293B; --border: #334155; --accent: #22D3EE; --text: #F8FAFC; --muted: #94A3B8; --radius: 12px; --font: 'Plus Jakarta Sans', sans-serif; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; line-height: 1.6; }
    header { border-bottom: 1px solid var(--border); padding: 0 24px; position: sticky; top: 0; background: rgba(15,23,42,0.92); backdrop-filter: blur(12px); z-index: 100; }
    .header-inner { max-width: 900px; margin: 0 auto; height: 60px; display: flex; align-items: center; gap: 12px; }
    .back-btn { display: flex; align-items: center; gap: 6px; color: var(--muted); text-decoration: none; font-size: 0.82rem; font-weight: 600; transition: color 0.18s; }
    .back-btn:hover { color: var(--accent); }
    .logo { font-size: 1rem; font-weight: 800; color: var(--text); text-decoration: none; }
    .logo span { color: var(--accent); }
    .page-hero { max-width: 900px; margin: 0 auto; padding: 48px 24px 32px; }
    .breadcrumb { font-size: 0.75rem; color: var(--muted); margin-bottom: 12px; }
    .breadcrumb a { color: var(--muted); text-decoration: none; }
    .breadcrumb a:hover { color: var(--accent); }
    h1 { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 800; letter-spacing: -0.3px; margin-bottom: 8px; }
    .page-desc { color: var(--muted); font-size: 0.9rem; }
    main { max-width: 600px; margin: 0 auto; padding: 0 24px 80px; }
    .form-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; }
    .form-label { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; display: block; }
    input[type=date] { width: 100%; padding: 14px 16px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font); font-size: 1rem; font-weight: 600; outline: none; transition: border-color 0.18s; margin-bottom: 16px; }
    input[type=date]:focus { border-color: var(--accent); }
    .btn { width: 100%; padding: 14px; border-radius: var(--radius); border: none; background: var(--accent); color: #0F172A; font-family: var(--font); font-size: 1rem; font-weight: 800; cursor: pointer; transition: background 0.18s; }
    .btn:hover { background: #38BDF8; }
    .result-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 24px; display: none; }
    .result-card.show { display: block; }
    .age-main { font-size: 3rem; font-weight: 800; color: var(--accent); line-height: 1; margin-bottom: 4px; }
    .age-sub { font-size: 1rem; color: var(--muted); margin-bottom: 24px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-bottom: 16px; }
    .stat { background: var(--bg); border-radius: 8px; padding: 12px; text-align: center; }
    .stat-num { font-size: 1.3rem; font-weight: 800; color: var(--text); }
    .stat-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .next-bday { background: var(--bg); border-radius: 8px; padding: 14px 16px; font-size: 0.85rem; color: var(--muted); }
    .next-bday strong { color: var(--accent); }
    footer { border-top: 1px solid var(--border); padding: 24px; text-align: center; color: var(--muted); font-size: 0.78rem; }
    footer a { color: var(--accent); text-decoration: none; }
    @media (max-width: 480px) { .page-hero, main { padding-left: 16px; padding-right: 16px; } }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a class="back-btn" href="/toolkit/"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>Kembali</a>
      <a class="logo" href="/toolkit/">⚡ Toolbox<span>Online</span></a>
    </div>
  </header>
  <div class="page-hero">
    <div class="breadcrumb"><a href="/toolkit/">Home</a> › <a href="#">Kalkulator</a> › Kalkulator Umur</div>
    <h1>🎂 Kalkulator Umur</h1>
    <p class="page-desc">Hitung usia tepat dari tanggal lahir hingga hari ini.</p>
  </div>
  <main>
    <div class="form-card">
      <label class="form-label">Tanggal Lahir</label>
      <input type="date" id="dob" onchange="calculate()" />
      <button class="btn" onclick="calculate()">Hitung Umur</button>
    </div>
    <div class="result-card" id="result">
      <div class="age-main" id="age-main">–</div>
      <div class="age-sub" id="age-sub">–</div>
      <div class="stats-grid">
        <div class="stat"><div class="stat-num" id="s-bulan">–</div><div class="stat-label">Total Bulan</div></div>
        <div class="stat"><div class="stat-num" id="s-minggu">–</div><div class="stat-label">Total Minggu</div></div>
        <div class="stat"><div class="stat-num" id="s-hari">–</div><div class="stat-label">Total Hari</div></div>
        <div class="stat"><div class="stat-num" id="s-jam">–</div><div class="stat-label">Total Jam</div></div>
      </div>
      <div class="next-bday" id="next-bday"></div>
    </div>
  </main>
  <footer><p>© 2025 ToolboxOnline &nbsp;·&nbsp; <a href="/toolkit/">Kembali ke Dashboard</a></p></footer>
  <script>
    function calculate() {
      const dob = new Date(document.getElementById("dob").value);
      if (isNaN(dob)) return;
      const now = new Date();
      if (dob > now) { alert("Tanggal lahir tidak boleh di masa depan!"); return; }
      let y = now.getFullYear() - dob.getFullYear();
      let m = now.getMonth() - dob.getMonth();
      let d = now.getDate() - dob.getDate();
      if (d < 0) { m--; d += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
      if (m < 0) { y--; m += 12; }
      const totalDays = Math.floor((now - dob) / 86400000);
      const totalMonths = y * 12 + m;
      const totalWeeks = Math.floor(totalDays / 7);
      const totalHours = totalDays * 24;
      document.getElementById("age-main").textContent = y + " Tahun";
      document.getElementById("age-sub").textContent = m + " bulan " + d + " hari";
      document.getElementById("s-bulan").textContent = totalMonths.toLocaleString("id");
      document.getElementById("s-minggu").textContent = totalWeeks.toLocaleString("id");
      document.getElementById("s-hari").textContent = totalDays.toLocaleString("id");
      document.getElementById("s-jam").textContent = totalHours.toLocaleString("id");
      // next birthday
      let nextBday = new Date(now.getFullYear(), dob.getMonth(), dob.getDate());
      if (nextBday <= now) nextBday.setFullYear(now.getFullYear() + 1);
      const daysLeft = Math.ceil((nextBday - now) / 86400000);
      const months = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agt","Sep","Okt","Nov","Des"];
      document.getElementById("next-bday").innerHTML = "🎉 Ulang tahun berikutnya: <strong>" + nextBday.getDate() + " " + months[nextBday.getMonth()] + " " + nextBday.getFullYear() + "</strong> — <strong>" + daysLeft + " hari lagi</strong>";
      document.getElementById("result").classList.add("show");
    }
  </script>
</body>
</html>
